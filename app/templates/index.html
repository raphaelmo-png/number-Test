<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字提交 - Number Monitor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input[type="number"] { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 0.75rem; background-color: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #45a049; }
        #message { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; display: none; text-align: center; }
        .success { background-color: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
        .error { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
        .nav { text-align: center; margin-top: 1rem; }
        .nav a { color: #666; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>數字提交</h1>
        <form id="numberForm">
            <div class="form-group">
                <label for="numberInput">請輸入一個數字：</label>
                <input type="number" id="numberInput" required step="1" placeholder="例如: 42">
            </div>
            <button type="submit">送出</button>
        </form>
        <div id="message"></div>
        <div class="nav">
            <a href="/admin">前往管理頁面 &rarr;</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('numberForm');
        const messageDiv = document.getElementById('message');
        const input = document.getElementById('numberInput');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.style.display = 'none';
            
            const value = parseInt(input.value);
            if (isNaN(value)) {
                showMessage('請輸入有效的數字', 'error');
                return;
            }

            try {
                const response = await fetch('/api/numbers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value })
                });

                const result = await response.json();
                if (response.ok) {
                    showMessage('送出成功！', 'success');
                    input.value = '';
                } else {
                    showMessage('錯誤: ' + (result.detail || '未知錯誤'), 'error');
                }
            } catch (err) {
                showMessage('無法連線到伺服器', 'error');
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
